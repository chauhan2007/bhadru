<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ritika ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    color:white;
}

#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

.petal{
    position:absolute;
    color:#ff4d6d;
    font-size:24px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

.container{
    position:relative;
    z-index:10;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

.title{
    font-size:55px;
    color:#ff4d6d;
    margin-bottom:20px;
    text-shadow:0 0 20px red;
}

.heart{
    position:relative;
    width:150px;
    height:150px;
    background:red;
    transform:rotate(-45deg);
    animation:beat 1.2s infinite;
    box-shadow:0 0 40px red;
    margin:40px;
}

.heart:before,
.heart:after{
    content:'';
    width:150px;
    height:150px;
    background:red;
    border-radius:50%;
    position:absolute;
}

.heart:before{
    top:-75px;
    left:0;
}

.heart:after{
    left:75px;
    top:0;
}

@keyframes beat{
    0%{transform:rotate(-45deg) scale(1);}
    25%{transform:rotate(-45deg) scale(1.1);}
    50%{transform:rotate(-45deg) scale(1);}
    75%{transform:rotate(-45deg) scale(1.15);}
    100%{transform:rotate(-45deg) scale(1);}
}

.name{
    font-size:48px;
    color:#ff9db5;
    margin-bottom:30px;
}

.typing{
    max-width:850px;
    font-size:24px;
    line-height:1.8;
    min-height:250px;
}

.final{
    margin-top:25px;
    font-size:38px;
    color:#ff4d6d;
    opacity:0;
    transition:3s;
    text-shadow:0 0 20px red;
}

@media(max-width:768px){

.title{
    font-size:40px;
}

.name{
    font-size:32px;
}

.typing{
    font-size:18px;
}

.final{
    font-size:28px;
}
}

</style>
</head>
<body>

<div id="stars"></div>

<div class="container">

<div class="title">
✨ Happy Best Friend Day ✨
</div>

<div class="heart"></div>

<div class="name">
Ritika ❤️
</div>

<div class="typing" id="typing"></div>

<div class="final" id="final">
Forever Grateful For Our Friendship ❤️
</div>

</div>

<script>

for(let i=0;i<200;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*5+"s";

document.getElementById("stars").appendChild(star);

}

for(let i=0;i<30;i++){

let petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌹";

petal.style.left=Math.random()*100+"%";
petal.style.animationDuration=(6+Math.random()*6)+"s";
petal.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(petal);

}

const text = `

People meet countless people in life,

but only a few become a part of their happiest memories.

Thank you for every laugh,
every conversation,
every piece of advice,
and every memory that became special because you were there.

Your friendship has brought happiness,
comfort and countless smiles into my life.

A friend like you is rare,
and I feel lucky to know you.

Happy Best Friend Day Ritika ❤️

`;

let i=0;

function typeWriter(){

if(i<text.length){

document.getElementById("typing").innerHTML += text.charAt(i);

i++;

setTimeout(typeWriter,40);

}else{

document.getElementById("final").style.opacity=1;

}

}

setTimeout(typeWriter,1500);

</script>

</body>
</html>
